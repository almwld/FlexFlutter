name: Flex Yemen Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Force Build Configuration
        run: |
          rm -rf android/
          flutter create --project-name flex_yemen --platforms android .
          
          # حقن القيم في local.properties (هذه أقوى طريقة لفرض الإصدارات)
          echo "flutter.minSdkVersion=20" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          
          # تعديل ملف build.gradle ليقرأ من local.properties
          sed -i 's/minSdk = .*/minSdk = localProperties.getProperty("flutter.minSdkVersion").toInteger()/' android/app/build.gradle
          sed -i 's/targetSdk = .*/targetSdk = localProperties.getProperty("flutter.targetSdkVersion").toInteger()/' android/app/build.gradle
          sed -i 's/compileSdk = .*/compileSdk = localProperties.getProperty("flutter.compileSdkVersion").toInteger()/' android/app/build.gradle

          # تحديث إصدارات Gradle الأساسية
          sed -i 's/id "com.android.application" version ".*"/id "com.android.application" version "8.1.1"/' android/settings.gradle
          sed -i 's/gradle-.*-all.zip/gradle-8.0-all.zip/' android/gradle/wrapper/gradle-wrapper.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Generate App Icons
        run: flutter pub run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flex-yemen-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
