name: Flex Yemen Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Strategic Android Repair
        run: |
          rm -rf android/
          flutter create --project-name flex_yemen --platforms android .
          
          # إعدادات الأندرويد المفروضة بقوة لتتوافق مع awesome_notifications
          cat << 'CONF' > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          android {
              namespace "com.example.flex_yemen"
              compileSdk 36

              defaultConfig {
                  applicationId "com.example.flex_yemen"
                  minSdk 23
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }

          flutter {
              source '../..'
          }
          CONF

          # تحديث المحرك الرئيسي
          sed -i 's/id "com.android.application" version ".*"/id "com.android.application" version "8.1.1"/' android/settings.gradle
          sed -i 's/id "org.jetbrains.kotlin.android" version ".*"/id "org.jetbrains.kotlin.android" version "1.9.20"/' android/settings.gradle
          sed -i 's/gradle-.*-all.zip/gradle-8.0-all.zip/' android/gradle/wrapper/gradle-wrapper.properties

      - name: Build APK
        run: |
          flutter pub get
          flutter pub run flutter_launcher_icons
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flex-yemen-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
