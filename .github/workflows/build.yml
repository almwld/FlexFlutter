name: Flex Yemen Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # إضافة إمكانية التشغيل اليدوي من الموقع

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # تغيير التوزيعة لضمان التحميل
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Repair and Force SDK
        run: |
          rm -rf android/
          flutter create --project-name flex_yemen --platforms android .
          
          # فرض الإعدادات التي حلت مشاكل الخرائط والإشعارات سابقاً
          sed -i 's/minSdk = .*/minSdk = 21/' android/app/build.gradle
          sed -i 's/targetSdk = .*/targetSdk = 34/' android/app/build.gradle
          sed -i 's/compileSdk = .*/compileSdk = 34/' android/app/build.gradle
          
          # تحديث محرك البناء
          sed -i 's/id "com.android.application" version ".*"/id "com.android.application" version "8.1.1"/' android/settings.gradle
          sed -i 's/gradle-.*-all.zip/gradle-8.0-all.zip/' android/gradle/wrapper/gradle-wrapper.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Generate App Icons
        run: flutter pub run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flex-yemen-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
