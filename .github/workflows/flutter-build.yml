name: Flutter CI/CD

on:
  push:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      - name: Create proper Flutter project
        run: |
          mkdir -p /tmp/saved_code
          cp -r lib /tmp/saved_code/ 2>/dev/null || true
          
          cd /tmp
          flutter create flex_yemen --org com.flexyemen
          
          cp -r /tmp/saved_code/lib/* /tmp/flex_yemen/lib/ 2>/dev/null || true
          
          # pubspec.yaml بدون أصول مفقودة
          cat > /tmp/flex_yemen/pubspec.yaml << 'PUBSPEC'
name: flex_yemen
description: تطبيق فلكس يمن - السوق الإلكتروني اليمني
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
PUBSPEC
          
          rm -rf $GITHUB_WORKSPACE/*
          cp -r /tmp/flex_yemen/* $GITHUB_WORKSPACE/
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
