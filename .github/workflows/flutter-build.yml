name: Flutter CI/CD

on:
  push:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      - name: Create Flutter project structure
        run: |
          # نقل الكود لمؤقت
          mkdir -p temp_lib
          cp -r lib/* temp_lib/ 2>/dev/null || true
          cp pubspec.yaml temp_lib/ 2>/dev/null || true
          
          # إنشاء مشروع جديد
          flutter create . --org com.flexyemen --project-name flex_yemen --overwrite
          
          # إعادة الكود
          cp -r temp_lib/lib/* lib/ 2>/dev/null || true
          cp temp_lib/pubspec.yaml . 2>/dev/null || true
          
          # تنظيف
          rm -rf temp_lib
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
