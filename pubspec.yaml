name: flex_yemen
description: "Flex Yemen Multi-Vendor Marketplace"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.0.0
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
