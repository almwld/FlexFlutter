dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # أضف هنا مسارات الصور التي استخدمناها (مثل بانر رمضان)
  assets:
    - assets/images/
