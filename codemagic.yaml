workflows:
  flex-yemen-android:
    name: Flex Yemen Android
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Create Flutter project structure
        script: |
          mkdir -p /tmp/my_code
          cp -r lib /tmp/my_code/
          cp pubspec.yaml /tmp/my_code/
          
          cd /tmp
          flutter create flex_yemen_new --org com.flexyemen
          
          # إنشاء main.dart
          printf '%s\n' \
            "import 'package:flutter/material.dart';" \
            "import 'app.dart';" \
            "" \
            "void main() => runApp(const FlexYemenApp());" > /tmp/flex_yemen_new/lib/main.dart
          
          # إنشاء app.dart
          printf '%s\n' \
            "import 'package:flutter/material.dart';" \
            "import 'navigation/main_navigation.dart';" \
            "import 'theme/app_theme.dart';" \
            "" \
            "class FlexYemenApp extends StatefulWidget {" \
            "  const FlexYemenApp({super.key});" \
            "" \
            "  @override" \
            "  State<FlexYemenApp> createState() => _FlexYemenAppState();" \
            "}" \
            "" \
            "class _FlexYemenAppState extends State<FlexYemenApp> {" \
            "  bool isDarkMode = true;" \
            "  int cartCount = 0;" \
            "" \
            "  void toggleTheme() => setState(() => isDarkMode = !isDarkMode);" \
            "  void addToCart() => setState(() => cartCount++);" \
            "" \
            "  @override" \
            "  Widget build(BuildContext context) {" \
            "    return MaterialApp(" \
            "      debugShowCheckedModeBanner: false," \
            "      theme: AppTheme.lightTheme," \
            "      darkTheme: AppTheme.darkTheme," \
            "      themeMode: isDarkMode ? ThemeMode.dark : ThemeMode.light," \
            "      home: MainNavigation(" \
            "        isDarkMode: isDarkMode," \
            "        cartCount: cartCount," \
            "        onThemeToggle: toggleTheme," \
            "        onAddToCart: addToCart," \
            "      )," \
            "    );" \
            "  }" \
            "}" > /tmp/flex_yemen_new/lib/app.dart
          
          # نسخ باقي الملفات
          cp -r /tmp/my_code/lib/theme /tmp/flex_yemen_new/lib/ 2>/dev/null || true
          cp -r /tmp/my_code/lib/navigation /tmp/flex_yemen_new/lib/ 2>/dev/null || true
          cp -r /tmp/my_code/lib/screens /tmp/flex_yemen_new/lib/ 2>/dev/null || true
          cp -r /tmp/my_code/lib/widgets /tmp/flex_yemen_new/lib/ 2>/dev/null || true
          cp /tmp/my_code/pubspec.yaml /tmp/flex_yemen_new/
          
          rm -rf $CM_BUILD_DIR/*
          cp -r /tmp/flex_yemen_new/* $CM_BUILD_DIR/
      
      - name: Get dependencies
        script: flutter pub get
      
      - name: Build APK
        script: flutter build apk --release
    
    artifacts:
      - build/**/outputs/**/*.apk
